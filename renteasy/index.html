<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentEasy - Find Homes & Offices</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="main-header">
    <div class="header-top">
      <div class="brand-container">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
          <defs>
            <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fb923c" />
              <stop offset="100%" stop-color="#ea580c" />
            </linearGradient>
            <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#38bdf8" />
              <stop offset="100%" stop-color="#0284c7" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="8" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <circle cx="250" cy="250" r="220" fill="#1e293b" opacity="0.6" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
          <circle cx="130" cy="310" r="18" fill="url(#orangeGrad)" filter="url(#glow)"/>
          <circle cx="370" cy="310" r="18" fill="url(#cyanGrad)" filter="url(#glow)"/>
          <path d="M 130 310 Q 250 210 370 310" fill="none" stroke="url(#orangeGrad)" stroke-width="16" stroke-linecap="round" />
          <path d="M 140 315 Q 250 240 360 315" fill="none" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
          <path d="M 180 230 L 250 160 L 320 230" fill="none" stroke="url(#cyanGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
          <path d="M 290 185 V 165 H 305 V 200" fill="none" stroke="url(#cyanGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="250" cy="250" r="12" fill="#ffffff" filter="url(#glow)"/>
        </svg>
        <h1 class="brand-name">RentEasy</h1>
      </div>

      <nav class="nav-tabs">
        <button class="tab-btn active" data-tab="browse">Browse Properties</button>
        <button class="tab-btn" data-tab="list">List Your Property</button>
      </nav>
    </div>

    <!-- Category Filter Row (Split 1RK & 1BHK) -->
    <div id="filter-nav" class="filters-row">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="1rk">1RK</button>
      <button class="filter-btn" data-type="1bhk">1BHK</button>
      <button class="filter-btn" data-type="2bhk">2BHK+</button>
      <button class="filter-btn" data-type="plot">Plots</button>
      <button class="filter-btn" data-type="office">Office</button>
    </div>
  </header>

  <!-- Browse Properties Section -->
  <section id="browse-section" class="tab-section active">
    <main id="listings">
      <!-- Cards dynamically inserted here -->
    </main>
  </section>

  <!-- List Property Section -->
  <section id="list-section" class="tab-section">
    <div class="list-property-container">
      <h2>List Your Property</h2>
      <p>Fill out the details below. Select multiple images directly from your gallery!</p>
      
      <form id="native-property-form" class="custom-form">
        <div class="form-group">
          <label for="prop-name">Property Name / Title *</label>
          <input type="text" id="prop-name" placeholder="e.g. Luxury Villa, Cozy House" required>
        </div>

        <div class="form-group">
          <label for="prop-price">Property Price (₹ / month) *</label>
          <input type="number" id="prop-price" placeholder="e.g. 20000" required>
        </div>

        <div class="form-group">
          <label for="prop-location">Property Location *</label>
          <input type="text" id="prop-location" placeholder="e.g. Hassan, Bangalore" required>
        </div>

        <!-- Property Type with Split 1RK & 1BHK -->
        <div class="form-group">
          <label for="prop-type">Property Type *</label>
          <select id="prop-type" required>
            <option value="1RK">1RK</option>
            <option value="1BHK">1BHK</option>
            <option value="2BHK+">2BHK+</option>
            <option value="Plots">Plots</option>
            <option value="Office">Office</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prop-phone">Contact Phone Number *</label>
          <input type="tel" id="prop-phone" placeholder="e.g. 9876543210" required>
        </div>

        <div class="form-group">
          <label for="prop-image-files">Property Images (Select one or more) *</label>
          <input type="file" id="prop-image-files" accept="image/*" multiple required>
          <small class="upload-hint">Select multiple photos at once from your gallery.</small>
        </div>

        <button type="submit" id="submit-btn" class="action-form-btn">
          Submit Property Listing
        </button>

        <p id="form-status" class="form-status-msg"></p>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
