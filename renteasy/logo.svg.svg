<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Orange Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    
    <!-- Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (Subtle Dark Glass Glow) -->
  <circle cx="250" cy="250" r="220" fill="#1e293b" opacity="0.6" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>

  <!-- Left Pillar / Node (Owner) -->
  <circle cx="130" cy="310" r="18" fill="url(#orangeGrad)" filter="url(#glow)"/>
  
  <!-- Right Pillar / Node (Customer) -->
  <circle cx="370" cy="310" r="18" fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- Connecting Arch / Bridge Base -->
  <path d="M 130 310 Q 250 210 370 310" 
        fill="none" 
        stroke="url(#orangeGrad)" 
        stroke-width="16" 
        stroke-linecap="round" />

  <!-- Dynamic Secondary Bridge Wave -->
  <path d="M 140 315 Q 250 240 360 315" 
        fill="none" 
        stroke="url(#cyanGrad)" 
        stroke-width="8" 
        stroke-linecap="round" 
        opacity="0.8"/>

  <!-- House Roof (Floating over the Bridge) -->
  <path d="M 180 230 L 250 160 L 320 230" 
        fill="none" 
        stroke="url(#cyanGrad)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- House Chimney/Accent -->
  <path d="M 290 185 V 165 H 305 V 200" 
        fill="none" 
        stroke="url(#cyanGrad)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Center Connection Heart/Key Node -->
  <circle cx="250" cy="250" r="12" fill="#ffffff" filter="url(#glow)"/>
</svg>
